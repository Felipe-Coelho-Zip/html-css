<!DOCTYPE html>
<html lang="tp-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /*
                    SELETORES PERSONALIZADOS
        # = id
        . = class
        : = pseudo-class
        :: = peseudo-element
        > = children
        
        
        
        
        
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        a{
            color: black;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited{
            color: aqua;
        }

        a:hover{
            color: black;
            text-decoration: underline;
        }

        a:active{
            color: chartreuse;
        }

        .especial{
            background-color: darkred;
        } 

        .especial::before{

            content:'➙';
        }
        .especial::after{
            content:'➙';
            
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://github.com/gustavoguanabara" target="_blank" rel="">Repositório GitHub</a></li>
        <li><a href="https://www.youtube.com/@cursoemvideo" class="especial" target="_blank" rel="">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com/" target="_blank" rel="">Site do Curso em Vídeo</a></li>
    </ul>
</body>
</html>
